<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Портовый банк — Фикбухта</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f2a 0%, #0b1a3a 30%, #0a1a3a 70%, #0b1030 100%);
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            padding: 20px;
            position: relative;
            color: #eef5ff;
            overflow-x: hidden;
        }
        .star {
            position: fixed;
            color: white;
            font-size: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: starTwinkle 3s infinite alternate;
        }
        .star::before {
            content: "✦";
            font-size: clamp(8px, 1.5vw, 14px);
            display: block;
            text-shadow: 0 0 4px white, 0 0 8px rgba(255,255,200,0.8);
        }
        @keyframes starTwinkle {
            0% { opacity: 0.1; text-shadow: 0 0 1px white; transform: scale(0.8);}
            100% { opacity: 1; text-shadow: 0 0 8px white, 0 0 12px #ffddaa; transform: scale(1.2);}
        }
        .milky-way {
            position: fixed;
            top: 0;
            left: -20%;
            width: 140%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(180, 200, 255, 0.08) 0%, rgba(130, 150, 210, 0.03) 40%, transparent 70%);
            transform: rotate(25deg);
            pointer-events: none;
            z-index: 0;
            filter: blur(40px);
        }
        .lantern {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 100px;
            z-index: 10;
            filter: drop-shadow(0 0 8px #ffaa33);
            transition: 0.3s;
        }
        .lantern-glow {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,200,100,0.15), transparent 70%);
            pointer-events: none;
            z-index: 9;
            animation: flicker 2s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.4; transform: scale(0.95);}
            100% { opacity: 1; transform: scale(1.05);}
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            background: rgba(8, 18, 35, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 25px 20px 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,220,150,0.2);
            border: 1px solid rgba(255,215,140,0.4);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            letter-spacing: 3px;
            color: #ffefc0;
            text-shadow: 0 0 8px #ffb347, 0 0 3px #2a3f5e;
            margin-bottom: 5px;
            font-weight: normal;
        }
        .sub {
            text-align: center;
            font-style: italic;
            margin-bottom: 15px;
            color: #bdd4ff;
            font-size: 0.9rem;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #ffdfaa;
            font-size: 1.2rem;
        }
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 18, 35, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(20, 35, 60, 0.95);
            border-radius: 48px;
            padding: 40px;
            border: 1px solid #ffcf8a;
            text-align: center;
            max-width: 350px;
        }
        .login-box h3 {
            color: #ffdfaa;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 25, 45, 0.9);
            border: 1px solid #ffcf8a;
            border-radius: 30px;
            color: #f0f4ff;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .login-btn {
            background: linear-gradient(135deg, #ffb347, #ff8c1a);
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: #0f1a2c;
            font-weight: bold;
            cursor: pointer;
        }
        .skip-btn {
            background: none;
            border: 1px solid #ffcf8a;
            padding: 10px 30px;
            border-radius: 40px;
            color: #ffdfaa;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-msg {
            color: #ff8888;
            margin-top: 10px;
            font-size: 0.8rem;
        }
        .admin-panel {
            background: rgba(15, 25, 45, 0.6);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ffcf8a;
        }
        .admin-panel.visible { display: block; }
        .tool-btn {
            background: linear-gradient(135deg, #4a6a8a, #2c4e6e);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .search-box { margin-bottom: 20px; }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(15, 25, 45, 0.9);
            border: 1px solid #ffcf8a;
            border-radius: 40px;
            color: #f0f4ff;
            font-size: 1rem;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        .users-table tr { border-bottom: 1px solid rgba(255,215,140,0.2); }
        .users-table th {
            padding: 12px 8px;
            text-align: left;
            color: #ffdfaa;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        .users-table th:hover { color: #ffb347; }
        .users-table td { padding: 12px 8px; }
        .user-name { font-weight: bold; color: #ffefc0; }
        .user-balance {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd966;
            text-align: center;
        }
        .admin-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: rgba(0,0,0,0.4);
            border: 1px solid #ffcf8a;
            border-radius: 30px;
            padding: 5px 12px;
            color: #ffdfaa;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .admin-btn:hover { background: #ffb347; color: #0a0f2a; }
        .btn-plus5 { background: #2a5a3a; border-color: #88ffaa; }
        .btn-custom { background: #5a3a2a; border-color: #ffaa88; }
        .history-section {
            margin-top: 25px;
            background: rgba(10, 20, 40, 0.5);
            border-radius: 24px;
            padding: 15px;
        }
        .history-title {
            color: #ffdfaa;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .history-list {
            max-height: 250px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #bdd4ff;
            display: none;
        }
        .history-list.open { display: block; }
        .history-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,215,140,0.1);
        }
        .copy-btn {
            background: linear-gradient(135deg, #6a5a8a, #4e3e6e);
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 15px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #88aaff;
        }
        @media (max-width: 700px) {
            .users-table td, .users-table th { padding: 8px 4px; }
            .user-balance { font-size: 1rem; }
            .admin-buttons { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>

<div class="milky-way"></div>
<div class="lantern-glow"></div>
<svg class="lantern" viewBox="0 0 60 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="25" y="10" width="10" height="15" fill="#8B6914"/>
    <rect x="15" y="25" width="30" height="40" rx="5" fill="#D4A017" stroke="#FFD700" stroke-width="1"/>
    <rect x="20" y="30" width="20" height="30" rx="3" fill="#FFDD88" opacity="0.9"/>
    <rect x="22" y="35" width="16" height="20" rx="2" fill="#FFAA33" opacity="0.6"/>
    <rect x="20" y="65" width="20" height="5" fill="#8B6914"/>
    <rect x="25" y="70" width="10" height="25" fill="#8B6914"/>
    <circle cx="30" cy="50" r="8" fill="#FFEEAA" opacity="0.8"/>
</svg>

<div class="container">
    <h1>⚓ ПОРТОВЫЙ БАНК ⚓</h1>
    <div class="sub">учет дублонов</div>

    <div id="adminPanel" class="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <span>🔧 Режим администратора</span>
            <button class="admin-btn" id="logoutBtn" style="background:#8a4a4a;">🚪 Выйти</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по имени...">
    </div>

    <div id="loadingMsg" class="loading">⏳ Загрузка данных из таблицы...</div>

    <div style="overflow-x: auto; display:none;" id="tableContainer">
        <table class="users-table">
            <thead>
                <tr><th id="sortName">👤 Участник</th><th id="sortBalance" style="text-align:center">🪙 Дублоны</th><th id="adminActionsHeader" style="display:none">⚡ Действия</th></tr>
            </thead>
            <tbody id="usersList"></tbody>
        </table>
    </div>

    <div id="addUserBlock" style="display:none;">
        <button class="tool-btn" id="addUserBtn" style="margin:15px 0;">➕ ДОБАВИТЬ УЧАСТНИКА</button>
    </div>

    <button class="copy-btn" id="copyForChatBtn" style="display:none;">📋 СКОПИРОВАТЬ БАЛАНСЫ ДЛЯ БЕСЕДЫ</button>

    <div class="history-section" style="display:none;" id="historySection">
        <div class="history-title" id="historyToggle">📜 ИСТОРИЯ ОПЕРАЦИЙ ▼</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <footer>vk.com/fickbuhta — Портовый банк</footer>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const ADMIN_PASSWORD = "Fcnjyvfhnby2021";
    // ⚠️ ВСТАВЬТЕ СЮДА ВАШ URL ИЗ APPS SCRIPT ⚠️
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxIBi3sysgdFR7a-6vofTAy1kLnSub2FJU_CfIwnNrx6wMmw7hV-edIdDPFsdyG3WftUw/exec";
    
    let users = [];
    let history = [];
    let isAdmin = false;
    let currentSort = { field: 'balance', order: 'desc' };
    
    // ========== ЗАГРУЗКА ==========
    async function loadFromGoogleSheets() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (data.users && Array.isArray(data.users)) {
                users = data.users;
                return true;
            }
            return false;
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            return false;
        }
    }
    
    // ========== СОХРАНЕНИЕ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ ==========
    async function saveAllToGoogleSheets() {
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ users: users })
            });
            return true;
        } catch(e) {
            console.error('Ошибка сохранения:', e);
            return false;
        }
    }
    
    // ========== ОПЕРАЦИИ ==========
    async function addDublon(userId, amount, reason) {
        const user = users.find(u => u.id === userId);
        if (!user) return;
        user.balance += amount;
        addToHistory(user.name, amount, reason, true);
        await saveAllToGoogleSheets();
        renderUsers();
    }
    
    async function subtractDublons(userId, amount, reason) {
        const user = users.find(u => u.id === userId);
        if (!user) return false;
        if (user.balance < amount) {
            alert(`У ${user.name} недостаточно дублонов! Доступно: ${user.balance}`);
            return false;
        }
        user.balance -= amount;
        addToHistory(user.name, amount, reason, false);
        await saveAllToGoogleSheets();
        renderUsers();
        return true;
    }
    
    async function addNewUser(name) {
        if (!name || name.trim() === '') {
            alert('Введите имя участника');
            return null;
        }
        if (users.some(u => u.name.toLowerCase() === name.trim().toLowerCase())) {
            alert('Такой участник уже есть!');
            return null;
        }
        const maxId = users.length > 0 ? Math.max(...users.map(u => u.id)) : -1;
        const newUser = { id: maxId + 1, name: name.trim(), balance: 0 };
        users.push(newUser);
        addToHistory(name.trim(), 0, "Создание счета", true);
        await saveAllToGoogleSheets();
        renderUsers();
        return newUser;
    }
    
    async function deleteUser(userId) {
        const user = users.find(u => u.id === userId);
        if (!user) return;
        if (confirm(`Удалить участника ${user.name}? Баланс ${user.balance} дублонов будет потерян.`)) {
            users = users.filter(u => u.id !== userId);
            addToHistory(user.name, user.balance, "Удаление счета", false);
            await saveAllToGoogleSheets();
            renderUsers();
        }
    }
    
    // ========== ИСТОРИЯ ==========
    function addToHistory(userName, amount, reason, isAdd) {
        const now = new Date();
        const timeStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        history.unshift({
            userName: userName,
            amount: amount,
            reason: reason,
            isAdd: isAdd,
            time: timeStr
        });
        if (history.length > 200) history.pop();
        renderHistory();
    }
    
    // ========== ОТОБРАЖЕНИЕ ==========
    function sortUsers() {
        users.sort((a, b) => {
            if (currentSort.field === 'name') {
                const comp = a.name.localeCompare(b.name);
                return currentSort.order === 'asc' ? comp : -comp;
            } else {
                const comp = a.balance - b.balance;
                return currentSort.order === 'asc' ? comp : -comp;
            }
        });
    }
    
    function renderUsers() {
        sortUsers();
        const tbody = document.getElementById('usersList');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const filtered = users.filter(u => u.name.toLowerCase().includes(searchTerm));
        
        tbody.innerHTML = '';
        filtered.forEach(user => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<span class="user-name">${escapeHtml(user.name)}</span>`;
            const balanceCell = row.insertCell(1);
            balanceCell.className = 'user-balance';
            balanceCell.innerHTML = `${user.balance}`;
            balanceCell.style.textAlign = 'center';
            
            if (isAdmin) {
                const cellActions = row.insertCell(2);
                cellActions.className = 'admin-buttons';
                cellActions.innerHTML = `
                    <button class="admin-btn" onclick="promptAdd(${user.id})">+1 🪙</button>
                    <button class="admin-btn btn-plus5" onclick="promptAdd5(${user.id})">+5 🪙</button>
                    <button class="admin-btn btn-custom" onclick="promptAddCustom(${user.id})">+? 🪙</button>
                    <button class="admin-btn" onclick="promptSubtract(${user.id})">- 🪙</button>
                    <button class="admin-btn" onclick="deleteUser(${user.id})" style="border-color:#ff8888;">🗑</button>
                `;
            }
        });
        
        const header = document.getElementById('adminActionsHeader');
        if (header) header.style.display = isAdmin ? 'table-cell' : 'none';
        
        document.getElementById('sortName').innerHTML = currentSort.field === 'name' ? (currentSort.order === 'asc' ? '👤 Участник ▲' : '👤 Участник ▼') : '👤 Участник';
        document.getElementById('sortBalance').innerHTML = currentSort.field === 'balance' ? (currentSort.order === 'asc' ? '🪙 Дублоны ▲' : '🪙 Дублоны ▼') : '🪙 Дублоны';
    }
    
    function renderHistory() {
        const historyDiv = document.getElementById('historyList');
        if (!historyDiv) return;
        if (history.length === 0) {
            historyDiv.innerHTML = '<div class="history-item">История пуста</div>';
            return;
        }
        historyDiv.innerHTML = history.slice(0, 100).map(item => {
            const sign = item.isAdd ? '➕ +' : '➖ -';
            const color = item.isAdd ? '#aaffaa' : '#ffaaaa';
            return `<div class="history-item" style="color:${color}">${item.time} — ${sign}${item.amount} 🪙 ${escapeHtml(item.userName)} <span style="color:#88aaff; font-size:0.7rem;"> (${escapeHtml(item.reason || 'без причины')})</span></div>`;
        }).join('');
    }
    
    // ========== ДИАЛОГИ ==========
    window.promptAdd = async (userId) => {
        const user = users.find(u => u.id === userId);
        const reason = prompt(`За что начислить дублон ${user?.name}?`, "отзыв");
        if (reason !== null) {
            await addDublon(userId, 1, reason || "отзыв");
            const newBalance = users.find(u => u.id === userId).balance;
            const msg = `${user.name}, начислен 1🪙 (${reason})\nИтого на счете: ${newBalance}🪙`;
            await navigator.clipboard.writeText(msg);
            alert('📋 Сообщение скопировано в буфер!');
        }
    };
    
    window.promptAdd5 = async (userId) => {
        const user = users.find(u => u.id === userId);
        const reason = prompt(`За что начислить 5 дублонов ${user?.name}?`, "Активный участник месяца");
        if (reason !== null) {
            await addDublon(userId, 5, reason || "активность");
            const newBalance = users.find(u => u.id === userId).balance;
            const msg = `${user.name}, начислен 5🪙 (${reason})\nИтого на счете: ${newBalance}🪙`;
            await navigator.clipboard.writeText(msg);
            alert('📋 Сообщение скопировано в буфер!');
        }
    };
    
    window.promptAddCustom = async (userId) => {
        const user = users.find(u => u.id === userId);
        const amount = prompt(`Сколько дублонов начислить ${user?.name}?`, "1");
        if (amount && !isNaN(parseInt(amount)) && parseInt(amount) > 0) {
            const reason = prompt(`Причина начисления:`, "отзыв/активность");
            if (reason !== null) {
                await addDublon(userId, parseInt(amount), reason || "начисление");
                const newBalance = users.find(u => u.id === userId).balance;
                const msg = `${user.name}, начислен ${amount}🪙 (${reason})\nИтого на счете: ${newBalance}🪙`;
                await navigator.clipboard.writeText(msg);
                alert('📋 Сообщение скопировано в буфер!');
            }
        } else if (amount) alert('Введите корректное число');
    };
    
    window.promptSubtract = async (userId) => {
        const user = users.find(u => u.id === userId);
        const amount = prompt(`Сколько дублонов списать у ${user?.name}? (Доступно: ${user?.balance})`, "1");
        if (amount && !isNaN(parseInt(amount)) && parseInt(amount) > 0) {
            const reason = prompt(`Причина списания (PR-пост, обложка...)`, "PR-пост");
            if (reason !== null) await subtractDublons(userId, parseInt(amount), reason);
        } else if (amount) alert('Введите корректное число');
    };
    
    window.deleteUser = deleteUser;
    
    function copyBalancesToChat() {
        let text = "⚓ ПОРТОВЫЙ БАНК ФИКБУХТЫ ⚓\n\n";
        [...users].sort((a,b) => b.balance - a.balance).forEach(user => {
            text += `${user.name} — ${user.balance} 🪙\n`;
        });
        text += `\n📅 ${new Date().toLocaleDateString()}\n#Фикбухта #ПортовыйБанк`;
        navigator.clipboard.writeText(text).then(() => alert('✅ Балансы скопированы!'));
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    // ========== ЗАГРУЗКА ==========
    async function initApp() {
        document.getElementById('loadingMsg').style.display = 'block';
        const success = await loadFromGoogleSheets();
        if (success && users.length > 0) {
            document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
            document.getElementById('copyForChatBtn').style.display = 'block';
            document.getElementById('historySection').style.display = 'block';
            renderUsers();
        } else {
            document.getElementById('loadingMsg').innerHTML = '❌ Ошибка загрузки данных. Проверьте таблицу.';
        }
    }
    
    // ========== АДМИН-ПАНЕЛЬ ==========
    function showAdminLogin() {
        const modal = document.createElement('div');
        modal.className = 'login-modal';
        modal.innerHTML = `
            <div class="login-box">
                <h3>⚓ ПОРТОВЫЙ БАНК ⚓</h3>
                <p style="color:#bdd4ff;">Введите пароль для управления</p>
                <input type="password" id="adminPasswordInput" placeholder="Пароль">
                <button class="login-btn" id="submitAdminPassword">Войти как админ</button>
                <button class="skip-btn" id="skipAdminLogin">Просмотр без пароля</button>
                <div id="adminLoginError" class="error-msg"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('submitAdminPassword').onclick = () => {
            const pwd = document.getElementById('adminPasswordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                modal.remove();
                document.getElementById('adminPanel').classList.add('visible');
                document.getElementById('addUserBlock').style.display = 'block';
                document.getElementById('logoutBtn').onclick = () => { isAdmin = false; location.reload(); };
                renderUsers();
            } else {
                document.getElementById('adminLoginError').innerText = 'Неверный пароль';
            }
        };
        document.getElementById('skipAdminLogin').onclick = () => { modal.remove(); renderUsers(); };
        document.getElementById('adminPasswordInput').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('submitAdminPassword').click(); };
    }
    
    // ========== ЗАПУСК ==========
    initApp();
    document.getElementById('searchInput').addEventListener('input', () => renderUsers());
    document.getElementById('copyForChatBtn').addEventListener('click', copyBalancesToChat);
    document.getElementById('historyToggle').onclick = () => document.getElementById('historyList').classList.toggle('open');
    document.getElementById('sortName').onclick = () => {
        if (currentSort.field === 'name') currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        else { currentSort.field = 'name'; currentSort.order = 'asc'; }
        renderUsers();
    };
    document.getElementById('sortBalance').onclick = () => {
        if (currentSort.field === 'balance') currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        else { currentSort.field = 'balance'; currentSort.order = 'desc'; }
        renderUsers();
    };
    document.getElementById('addUserBtn').onclick = async () => {
        const name = prompt("Введите имя нового участника:");
        if (name?.trim()) await addNewUser(name.trim());
    };
    showAdminLogin();
    
    function createStars() {
        for (let i = 0; i < 150; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 6 + 's';
            star.style.animationDuration = Math.random() * 4 + 2 + 's';
            document.body.appendChild(star);
        }
    }
    createStars();
</script>
</body>
</html>
